<!DOCTYPE html>
<html>

<head>

<title>All Candidates</title>

<style>

body{
font-family:Arial;
margin:0;
background:linear-gradient(to right,#eef0ef,#e6f2e6);
}

/* Header */
.header{
text-align:center;
padding:20px;
font-size:28px;
font-weight:bold;
}

/* Subheader */
.subheader{
text-align:center;
font-size:22px;
margin-bottom:30px;
}

/* Card */
.card{
width:90%;
margin:20px auto;
background:#f5f5f5;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);

display:flex;
align-items:center;
justify-content:space-between; /* ⭐ important */
gap:25px;
}

/* Image left */
.card img{
width:100px;
height:100px;
border-radius:50%;
object-fit:cover;
}

/* Right content */
.details{
text-align:left;
}

.details h3{
margin:0 0 10px 0;
font-size:22px;
}

.details p{
margin:6px 0;
font-size:16px;
}

/* Status */
.status{
font-weight:bold;
margin-top:10px;
}

.approved{ color:green; }
.rejected{ color:red; }
.pending{ color:orange; }

/* No data */
.nodata{
text-align:center;
font-size:18px;
margin-top:50px;
color:#555;
}

.action{
display:flex;
gap:10px;
}

/* Buttons */
.approve-btn{
background:green;
color:white;
border:none;
padding:8px 15px;
border-radius:6px;
cursor:pointer;
}

.reject-btn{
background:red;
color:white;
border:none;
padding:8px 15px;
border-radius:6px;
cursor:pointer;
}

/* TOP LEFT BACK BUTTON */
.close-btn{
position:fixed;
top:20px;
left:20px;   /* ✅ changed from right to left */
background:#333;
color:white;
border:none;
padding:10px 18px;
border-radius:8px;
cursor:pointer;
font-size:14px;
}

.close-btn:hover{
background:#000;
}

</style>

</head>


<body onload="loadCandidates()">


<!-- ✅ TOP LEFT BUTTON -->
<button class="close-btn" onclick="goBack()">← Back</button>

<div class="header">
Online Voting System
</div>

<div class="subheader">
All Candidates
</div>

<div id="candidateList"></div>


<script src="script.js"></script>

<script>

function goBack(){
window.location.href = "admin.html";
}

function loadCandidates(){

let candidates = JSON.parse(localStorage.getItem("candidates")) || [];
let rejected = JSON.parse(localStorage.getItem("rejectedCandidates")) || [];

let html = "";

/* If no data */
if(candidates.length === 0 && rejected.length === 0){
document.getElementById("candidateList").innerHTML =
"<div class='nodata'>No candidates available</div>";
return;
}

/* Approved + Pending */
candidates.forEach((c,i)=>{

let statusText = c.approved ? "Approved" : "Pending";
let statusClass = c.approved ? "approved" : "pending";
html += `
<div class="card">

<!-- LEFT -->
<div style="display:flex;align-items:center;gap:25px;">

<img src="${c.photo || 'https://via.placeholder.com/100'}">

<div class="details">

<h3>${c.name}</h3>

<p><b>Age:</b> ${c.age}</p>
<p><b>Address:</b> ${c.address}</p>
<p><b>Qualification:</b> ${c.qualification}</p>
<p><b>Symbol:</b> ${c.symbol}</p>

<p class="status ${statusClass}">
Status: ${statusText}
</p>

</div>
</div>

<!-- RIGHT SIDE BUTTONS -->
${!c.approved ? `
<div class="action">
<button onclick="approveCandidate(${i})" class="approve-btn">Approve</button>
<button onclick="rejectCandidate(${i})" class="reject-btn">Reject</button>
</div>
` : ""}

</div>
`;

});

/* Rejected Candidates */
rejected.forEach((c,i)=>{

html += `
<div class="card">

<!-- LEFT -->
<div style="display:flex;align-items:center;gap:25px;">

<img src="${c.photo || 'https://via.placeholder.com/100'}">

<div class="details">

<h3>${c.name}</h3>

<p><b>Age:</b> ${c.age}</p>
<p><b>Address:</b> ${c.address}</p>
<p><b>Qualification:</b> ${c.qualification}</p>
<p><b>Symbol:</b> ${c.symbol}</p>

<p class="status rejected">
Status: Rejected
</p>

</div>

</div>

<!-- EMPTY RIGHT SIDE (keeps alignment same) -->
<div style="width:120px;"></div>

</div>
`;
});

document.getElementById("candidateList").innerHTML = html;

}

function approveCandidate(index){

let candidates = JSON.parse(localStorage.getItem("candidates")) || [];

candidates[index].approved = true;

localStorage.setItem("candidates", JSON.stringify(candidates));

location.reload();
}

function rejectCandidate(index){

let candidates = JSON.parse(localStorage.getItem("candidates")) || [];
let rejected = JSON.parse(localStorage.getItem("rejectedCandidates")) || [];

rejected.push(candidates[index]);

candidates.splice(index,1);

localStorage.setItem("candidates", JSON.stringify(candidates));
localStorage.setItem("rejectedCandidates", JSON.stringify(rejected));

location.reload();
}

</script>

</body>

</html>

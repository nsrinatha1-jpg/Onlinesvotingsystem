<!DOCTYPE html>
<html>
<head>
<title>Online Voting</title>
<link rel="stylesheet" href="style.css">

<style>

/* FORCE PERFECT 3-COLUMN LAYOUT */
.main-layout{
    display:flex;
    justify-content:center;
    align-items:stretch;
    gap:40px;
    padding:60px 20px;
}

/* MAKE ALL 3 BOXES SAME SIZE */
.container{
    width:300px;
    min-height:320px;   /* equal height */
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

/* FIX BUTTON WIDTH SAME */
button{
    width:160px;
}

/* CENTER TEXT */
.container h2{
    text-align:center;
}

/* INPUT ALIGN */
.centerInput{
    width:100%;
}

</style>

</head>

<body>

<header><h1>Online Voting System</h1></header>
<r>

<div class="main-layout">

    <!-- Admin Login -->
    <div class="container">
        <h2 style="color: black;">Admin Login</h2>

        <input id="admin-username" class="centerInput" placeholder="Enter username">
        <input id="mobile" class="centerInput" placeholder="Enter mobile">
        <input id="admin-password" type="password" class="centerInput" placeholder="Enter password">

        <select id="role">
            <option value="admin">Admin</option>
        </select>

        <button onclick="login()">Login</button>

        <p>New user? <a href="register.html">Register here</a></p>
    </div>

    <!-- Candidate Login -->
    <div class="container">
        <h2 style="color: black;">Candidate Login</h2>

        <input id="candidate-username" class="centerInput" placeholder="Enter username">
        <input id="candidate-password" type="password" class="centerInput" placeholder="Enter password">

        <button onclick="candidateLogin()">Login</button>
    </div>

    <!-- Voter Voting -->
    <div class="container">
        <h2 style="color: black;">Voter Voting</h2>

        <button onclick="window.location.href='voter-login.html'">
            Voter Login
        </button>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>

<!DOCTYPE html>
<html>

<head>
<title>Download Result</title>

<style>

body{
font-family:Arial;
margin:0;
background:linear-gradient(to right,#f7f9f7,#e6f2e6);
}

/* 🔙 BACK BUTTON */
.back-btn{
position:fixed;
top:20px;
left:20px;
padding:8px 18px;
background:#2a7be4;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
z-index:1000;
}

/* MENU */
.menu{
position:fixed;
top:20px;
right:25px;
font-size:26px;
cursor:pointer;
}

.dropdown{
display:none;
position:fixed;
top:55px;
right:25px;
background:white;
box-shadow:0 0 10px rgba(0,0,0,0.2);
border-radius:6px;
overflow:hidden;
z-index:1000;
}

/* TITLE */
h1{
text-align:center;
padding:30px;
}

/* TABLE */
table{
width:90%;
margin:20px auto;
border-collapse:collapse;
background:white;
}

th{
background:#2e7d32;
color:white;
padding:12px;
border:1px solid black;
}

td{
padding:12px;
text-align:center;
border:1px solid black;
}

img{
width:60px;
height:60px;
border-radius:50%;
}

/* 🏆 BUTTON */
.winner-btn{
position:fixed;
bottom:20px;
right:20px;
padding:12px 18px;
background:#ff9800;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
z-index:1000;
}

/* 🔥 OVERLAY (NO WHITE BACKGROUND) */
.winner-box{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4); /* light dark blur */
display:flex;
justify-content:center;
align-items:center;
z-index:2000;
}

/* 🎯 EXACT WINNER CARD */
.winner-card{
background:#f4d35e;
padding:30px;
border-radius:20px;
text-align:center;
width:320px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
animation:zoomIn 0.4s ease;
}

.winner-title{
color:#ff4d6d;
font-size:28px;
font-weight:bold;
margin-bottom:10px;
}

.winner-card img{
width:120px;
height:120px;
border-radius:50%;
border:5px solid #ff4d6d;
margin-bottom:10px;
}

.winner-card p{
margin:6px 0;
font-size:17px;
}

/* ANIMATION */
@keyframes zoomIn{
from{
transform:scale(0.5);
opacity:0;
}
to{
transform:scale(1);
opacity:1;
}
}

</style>

</head>

<body onload="loadResults()">

<button class="back-btn" onclick="window.location.href='admin.html'">← Back</button>

<div class="menu" onclick="toggleMenu()">⋮</div>

<div class="dropdown" id="menuBox">
<button onclick="printResult()">⬇ Download / Print PDF</button>
</div>

<button class="winner-btn" onclick="showWinner()">🏆 View Winner</button>

<!-- 🔥 WINNER POPUP -->
<div class="winner-box" id="winnerBox" onclick="closeWinner()"></div>

<h1>Election Result</h1>

<table id="resultTable">
<thead>
<tr>
<th>Photo</th>
<th>Name</th>
<th>Age</th>
<th>Qualification</th>
<th>Symbol</th>
<th>Votes</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>

/* LOAD RESULTS */
function loadResults(){

let candidates = JSON.parse(localStorage.getItem("candidates")) || [];
let html = "";

candidates.forEach(c => {
html += `
<tr>
<td><img src="${c.photo || 'https://via.placeholder.com/60'}"></td>
<td>${c.name}</td>
<td>${c.age}</td>
<td>${c.qualification}</td>
<td>${c.symbol}</td>
<td>${c.votes || 0}</td>
</tr>
`;
});

document.querySelector("#resultTable tbody").innerHTML = html;
}

/* MENU */
function toggleMenu(){
let menu = document.getElementById("menuBox");
menu.style.display = (menu.style.display === "block") ? "none" : "block";
}

/* PRINT */
function printResult(){
window.print();
}

/* 🏆 SHOW WINNER */
function showWinner(){

let candidates = JSON.parse(localStorage.getItem("candidates")) || [];

if(candidates.length === 0){
alert("No candidates found");
return;
}

/* FIND WINNER */
let winner = candidates.reduce((max, c)=>{
return (c.votes || 0) > (max.votes || 0) ? c : max;
});

let box = document.getElementById("winnerBox");

box.style.display = "flex";

box.innerHTML = `
<div class="winner-card" onclick="event.stopPropagation()">

<div class="winner-title">Winner</div>

<img src="${winner.photo || 'https://via.placeholder.com/120'}">

<p><b>Symbol:</b> ${winner.symbol}</p>
<p><b>Candidate:</b> ${winner.name}</p>
<p><b>Votes:</b> ${winner.votes || 0}</p>

</div>
`;
}

/* ❌ CLOSE WHEN CLICK OUTSIDE */
function closeWinner(){
document.getElementById("winnerBox").style.display = "none";
}

</script>

</body>
</html>
